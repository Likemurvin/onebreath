<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>one breath</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a08;
      --fg: #e8e4d9;
      --muted: #6b6860;
      --accent: #c8b89a;
      --glow: rgba(200, 184, 154, 0.12);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
      cursor: none;
    }

    /* custom cursor */
    .cursor {
      position: fixed;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.15s ease, opacity 0.3s;
      mix-blend-mode: screen;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.35;
    }

    .scene {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* ambient background glow */
    .ambient {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,184,154,0.04) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: ambientPulse 8s ease-in-out infinite;
    }

    @keyframes ambientPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    /* breath orb */
    .orb-container {
      position: relative;
      width: 180px; height: 180px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 56px;
    }

    .orb-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(200,184,154,0.15);
      animation: ringExpand 8s ease-in-out infinite;
    }
    .orb-ring:nth-child(1) { width: 180px; height: 180px; animation-delay: 0s; }
    .orb-ring:nth-child(2) { width: 140px; height: 140px; animation-delay: 0.3s; border-color: rgba(200,184,154,0.1); }
    .orb-ring:nth-child(3) { width: 100px; height: 100px; animation-delay: 0.6s; border-color: rgba(200,184,154,0.08); }

    @keyframes ringExpand {
      0%, 100% { transform: scale(0.88); opacity: 0.4; }
      50% { transform: scale(1); opacity: 1; }
    }

    .orb-core {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(200,184,154,0.9), rgba(200,184,154,0.2));
      box-shadow: 0 0 40px rgba(200,184,154,0.2), 0 0 80px rgba(200,184,154,0.08);
      animation: coreBreath 8s ease-in-out infinite;
    }

    @keyframes coreBreath {
      0%, 100% { transform: scale(0.82); box-shadow: 0 0 20px rgba(200,184,154,0.15), 0 0 60px rgba(200,184,154,0.05); }
      50% { transform: scale(1); box-shadow: 0 0 50px rgba(200,184,154,0.3), 0 0 100px rgba(200,184,154,0.1); }
    }

    /* text */
    .headline {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 300;
      letter-spacing: 0.02em;
      line-height: 1.4;
      text-align: center;
      color: var(--fg);
      opacity: 0;
      animation: fadeUp 1.2s ease 0.4s forwards;
      max-width: 520px;
      padding: 0 24px;
      margin-bottom: 12px;
    }

    .subtext {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.8s forwards;
      margin-bottom: 52px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* button */
    .breath-btn {
      position: relative;
      background: none;
      border: 1px solid rgba(200,184,154,0.3);
      color: var(--accent);
      font-family: 'Fragment Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 16px 40px;
      cursor: none;
      transition: border-color 0.4s, color 0.4s;
      opacity: 0;
      animation: fadeUp 1.2s ease 1.2s forwards;
      overflow: hidden;
    }

    .breath-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
      z-index: -1;
    }

    .breath-btn:hover {
      border-color: var(--accent);
      color: var(--bg);
    }
    .breath-btn:hover::before { transform: scaleX(1); }

    .breath-btn:active { transform: scale(0.97); }

    /* counter */
    .counter-wrap {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .counter-wrap.visible { opacity: 1; }

    .counter-number {
      font-family: 'Fragment Mono', monospace;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--accent);
      letter-spacing: -0.02em;
      display: block;
      line-height: 1;
      margin-bottom: 8px;
    }

    .counter-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* confirmation state */
    .confirmed-msg {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      z-index: 50;
    }

    .confirmed-msg.show { opacity: 1; }

    .confirmed-msg p {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 300;
      font-style: italic;
      color: var(--fg);
      text-align: center;
      max-width: 420px;
      padding: 0 24px;
      line-height: 1.6;
    }

    .confirmed-msg small {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* more link */
    .more-link {
      position: fixed;
      bottom: 28px;
      right: 36px;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.6rem;
      color: rgba(107,104,96,0.4);
      text-decoration: none;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .more-link:hover { color: var(--muted); }

    /* ripple on click */
    .ripple {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(200,184,154,0.4);
      pointer-events: none;
      z-index: 200;
      animation: rippleOut 1.2s ease-out forwards;
    }

    @keyframes rippleOut {
      from { width: 0; height: 0; opacity: 1; transform: translate(-50%,-50%) scale(1); }
      to { width: 400px; height: 400px; opacity: 0; transform: translate(-50%,-50%) scale(1); }
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="ambient"></div>

<div class="scene" id="main-scene">
  <div class="orb-container">
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb-core"></div>
  </div>

  <h1 class="headline">Before you do anything else —<br>take one breath. Consciously.</h1>
  <p class="subtext">just this. just now.</p>

  <button class="breath-btn" id="breathBtn">I did.</button>
</div>

<div class="counter-wrap" id="counterWrap">
  <span class="counter-number" id="counterNum">0</span>
  <span class="counter-label">people have paused here</span>
</div>

<div class="confirmed-msg" id="confirmedMsg">
  <p>That was real.</p>
  <small>come back tomorrow</small>
</div>

<a class="more-link" href="#">there is more, if you want it →</a>

<script>
  // cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  // counter — starts at a believable seed, persists in memory this session
  let count = parseInt(localStorage.getItem('ob_count') || '0');
  const seed = 48291; // baseline "existing" count for feel
  const displayCount = seed + count;

  const counterWrap = document.getElementById('counterWrap');
  const counterNum = document.getElementById('counterNum');

  function animateCount(target) {
    const start = seed;
    const duration = 1800;
    const startTime = performance.now();
    function tick(now) {
      const progress = Math.min((now - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      counterNum.textContent = Math.floor(start + (target - start) * eased).toLocaleString();
      if (progress < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  // show counter on load after delay
  setTimeout(() => {
    counterWrap.classList.add('visible');
    animateCount(displayCount);
  }, 2200);

  // button
  const btn = document.getElementById('breathBtn');
  const mainScene = document.getElementById('main-scene');
  const confirmedMsg = document.getElementById('confirmedMsg');
  let clicked = false;

  btn.addEventListener('click', function(e) {
    if (clicked) return;
    clicked = true;

    // ripple effect
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    ripple.style.left = e.clientX + 'px';
    ripple.style.top = e.clientY + 'px';
    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 1300);

    // increment
    count++;
    localStorage.setItem('ob_count', count);
    const newDisplay = seed + count;

    // fade out main
    mainScene.style.transition = 'opacity 0.8s ease';
    mainScene.style.opacity = '0';

    setTimeout(() => {
      mainScene.style.display = 'none';
      confirmedMsg.classList.add('show');
      // update counter
      animateCount(newDisplay);
    }, 800);
  });
</script>
</body>
</html>
